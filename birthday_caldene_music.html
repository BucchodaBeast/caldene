<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Caldene! 🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a0030; font-family: 'Nunito', sans-serif; overflow: hidden; height: 100vh; width: 100vw; }
  #confetti-canvas { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:100; }
  .stars { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; }
  .star { position:absolute; border-radius:50%; background:white; animation: twinkle var(--dur) infinite alternate; opacity:0; }
  @keyframes twinkle { from{opacity:0.1;transform:scale(0.8)} to{opacity:1;transform:scale(1.2)} }
  .slideshow { position:fixed; top:0; left:0; width:100%; height:100%; z-index:1; }
  .slide { position:absolute; top:0; left:0; width:100%; height:100%; opacity:0; transition:opacity 1.2s ease-in-out; }
  .slide.active { opacity:1; }
  .slide img { width:100%; height:100%; object-fit:cover; filter:brightness(0.55); }
  .overlay { position:fixed; top:0; left:0; width:100%; height:100%; z-index:10; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:20px; pointer-events:none; }
  .emoji-row { font-size:2.5rem; margin-bottom:10px; animation:bounce 1s infinite alternate; }
  @keyframes bounce { from{transform:translateY(0)} to{transform:translateY(-10px)} }
  .happy-birthday { font-family:'Pacifico',cursive; font-size:clamp(2.5rem,8vw,6rem); color:#fff; text-shadow:0 0 20px #ff69b4,0 0 40px #ff1493,0 0 80px #ff69b4,4px 4px 0 #c0006a; line-height:1.1; animation:glow 2s ease-in-out infinite alternate; }
  @keyframes glow { from{text-shadow:0 0 20px #ff69b4,0 0 40px #ff1493,4px 4px 0 #c0006a} to{text-shadow:0 0 40px #ff69b4,0 0 80px #ff69b4,0 0 120px #ff1493,4px 4px 0 #c0006a} }
  .name { font-family:'Pacifico',cursive; font-size:clamp(3rem,12vw,9rem); background:linear-gradient(135deg,#FFD700,#FF69B4,#FF1493,#FFD700); background-size:300% 300%; -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; animation:shimmer 3s ease-in-out infinite; line-height:1; margin:5px 0 15px; filter:drop-shadow(0 4px 8px rgba(255,105,180,0.5)); }
  @keyframes shimmer { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
  .wishes { font-size:clamp(1rem,3vw,1.6rem); color:#ffe4f3; font-weight:700; max-width:600px; line-height:1.6; text-shadow:0 2px 10px rgba(0,0,0,0.8); background:rgba(255,20,147,0.15); border:2px solid rgba(255,105,180,0.3); border-radius:20px; padding:15px 25px; backdrop-filter:blur(10px); }
  .hearts { margin-top:20px; font-size:2rem; animation:float 3s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0) rotate(-5deg)} 50%{transform:translateY(-15px) rotate(5deg)} }
  .floating-heart { position:fixed; font-size:1.5rem; animation:floatUp var(--dur) linear infinite; opacity:0; z-index:5; }
  @keyframes floatUp { 0%{opacity:0;transform:translateY(100vh) scale(0.5)} 20%{opacity:1} 80%{opacity:1} 100%{opacity:0;transform:translateY(-20vh) scale(1.2) rotate(20deg)} }
  .dots { position:fixed; bottom:70px; left:50%; transform:translateX(-50%); display:flex; gap:10px; z-index:20; }
  .dot { width:10px; height:10px; border-radius:50%; background:rgba(255,255,255,0.3); transition:all 0.4s; cursor:pointer; pointer-events:all; }
  .dot.active { background:#FF69B4; transform:scale(1.4); box-shadow:0 0 10px #FF69B4; }

  /* Music button */
  #music-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 200;
    background: rgba(255,20,147,0.3);
    border: 2px solid #FF69B4;
    border-radius: 50px;
    color: white;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    padding: 10px 20px;
    cursor: pointer;
    pointer-events: all;
    backdrop-filter: blur(10px);
    transition: all 0.3s;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 0 20px rgba(255,105,180,0.4);
  }
  #music-btn:hover { background:rgba(255,20,147,0.6); transform:scale(1.05); }
  #music-btn .note { font-size:1.3rem; animation:noteBounce 0.5s infinite alternate; }
  @keyframes noteBounce { from{transform:rotate(-15deg) scale(0.9)} to{transform:rotate(15deg) scale(1.1)} }

  /* Music visualizer bars */
  .visualizer {
    position: fixed;
    bottom: 18px;
    left: 20px;
    display: flex;
    align-items: flex-end;
    gap: 3px;
    z-index: 200;
    height: 30px;
    opacity: 0;
    transition: opacity 0.5s;
  }
  .visualizer.playing { opacity: 1; }
  .bar {
    width: 4px;
    background: linear-gradient(to top, #FF1493, #FFD700);
    border-radius: 2px;
    animation: barAnim var(--speed) ease-in-out infinite alternate;
  }
  @keyframes barAnim { from{height:3px} to{height:var(--h)} }
</style>
</head>

<script>
// ═══════════════════════════════════════
// BIRTHDAY MUSIC via Web Audio API
// Plays "Happy Birthday to You" melody
// ═══════════════════════════════════════
let audioCtx = null;
let isPlaying = false;
let stopSignal = false;
let gainNode = null;

// Note frequencies
const NOTE = {
  C4:261.63, D4:293.66, E4:329.63, F4:349.23,
  G4:392.00, A4:440.00, B4:493.88,
  C5:523.25, D5:587.33, E5:659.25, F5:698.46,
  G5:783.99, A5:880.00,
  Bb4:466.16, Eb4:311.13, Ab4:415.30
};

// Happy Birthday melody with durations (seconds)
const MELODY = [
  [NOTE.G4,0.35],[NOTE.G4,0.1],[NOTE.A4,0.5],[NOTE.G4,0.5],[NOTE.C5,0.5],[NOTE.B4,0.9],
  [NOTE.G4,0.35],[NOTE.G4,0.1],[NOTE.A4,0.5],[NOTE.G4,0.5],[NOTE.D5,0.5],[NOTE.C5,0.9],
  [NOTE.G4,0.35],[NOTE.G4,0.1],[NOTE.G5,0.5],[NOTE.E5,0.5],[NOTE.C5,0.5],[NOTE.B4,0.5],[NOTE.A4,0.9],
  [NOTE.F5,0.35],[NOTE.F5,0.1],[NOTE.E5,0.5],[NOTE.C5,0.5],[NOTE.D5,0.5],[NOTE.C5,1.2],
];

// Harmony notes (lower chord layer)
const HARMONY = [
  [NOTE.E4,0.35],[NOTE.E4,0.1],[NOTE.F4,0.5],[NOTE.E4,0.5],[NOTE.G4,0.5],[NOTE.G4,0.9],
  [NOTE.E4,0.35],[NOTE.E4,0.1],[NOTE.F4,0.5],[NOTE.E4,0.5],[NOTE.G4,0.5],[NOTE.G4,0.9],
  [NOTE.E4,0.35],[NOTE.E4,0.1],[NOTE.E5,0.5],[NOTE.C5,0.5],[NOTE.G4,0.5],[NOTE.G4,0.5],[NOTE.F4,0.9],
  [NOTE.A4,0.35],[NOTE.A4,0.1],[NOTE.G4,0.5],[NOTE.G4,0.5],[NOTE.G4,0.5],[NOTE.G4,1.2],
];

function playNote(freq, startTime, duration, vol=0.3, type='sine') {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const envGain = audioCtx.createGain();
  osc.connect(envGain);
  envGain.connect(gainNode);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, startTime);
  envGain.gain.setValueAtTime(0, startTime);
  envGain.gain.linearRampToValueAtTime(vol, startTime + 0.02);
  envGain.gain.linearRampToValueAtTime(vol * 0.7, startTime + duration * 0.5);
  envGain.gain.linearRampToValueAtTime(0, startTime + duration);
  osc.start(startTime);
  osc.stop(startTime + duration + 0.05);
}

function scheduleMusic() {
  if (!audioCtx) return;
  let t = audioCtx.currentTime + 0.1;
  const tempo = 0.95; // slightly slower = more celebratory

  function playTrack(track, vol, type) {
    let time = t;
    track.forEach(([freq, dur]) => {
      playNote(freq, time, dur * tempo * 0.9, vol, type);
      time += dur * tempo;
    });
    return time;
  }

  const endTime = playTrack(MELODY, 0.35, 'triangle');
  playTrack(HARMONY, 0.18, 'sine');

  // Schedule repeat
  const loopDelay = (endTime - audioCtx.currentTime) * 1000 + 600;
  if (!stopSignal) {
    setTimeout(() => { if (!stopSignal && isPlaying) scheduleMusic(); }, loopDelay);
  }
}

function toggleMusic() {
  if (!isPlaying) {
    // Start music
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    gainNode = audioCtx.createGain();
    gainNode.gain.value = 0.7;
    gainNode.connect(audioCtx.destination);
    stopSignal = false;
    isPlaying = true;
    scheduleMusic();
    document.getElementById('btn-text').textContent = 'Stop Music';
    document.getElementById('note-icon').textContent = '🔇';
    document.getElementById('viz').classList.add('playing');
  } else {
    // Stop music
    stopSignal = true;
    isPlaying = false;
    if (gainNode) {
      gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
    }
    setTimeout(() => {
      if (audioCtx) { audioCtx.close(); audioCtx = null; }
    }, 400);
    document.getElementById('btn-text').textContent = 'Play Music';
    document.getElementById('note-icon').textContent = '🎵';
    document.getElementById('viz').classList.remove('playing');
  }
}

// Auto-start attempt (may need user gesture on some browsers)
window.addEventListener('click', function startOnce() {
  if (!isPlaying) toggleMusic();
  window.removeEventListener('click', startOnce);
}, { once: false });

// ═══════════════════════════════════════
// Stars
// ═══════════════════════════════════════
const starsEl = document.getElementById('stars');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random()*3+1;
  s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--dur:${Math.random()*3+1}s;animation-delay:${Math.random()*3}s;`;
  starsEl.appendChild(s);
}

// ═══════════════════════════════════════
// Floating hearts
// ═══════════════════════════════════════
const heartEmojis = ['💖','💕','💗','🌸','✨','🎀','💫','🎈'];
function createHeart() {
  const h = document.createElement('div');
  h.className = 'floating-heart';
  h.textContent = heartEmojis[Math.floor(Math.random()*heartEmojis.length)];
  h.style.left = Math.random()*100+'%';
  const dur = Math.random()*4+4;
  h.style.setProperty('--dur', dur+'s');
  h.style.animationDelay = Math.random()*2+'s';
  document.body.appendChild(h);
  setTimeout(()=>h.remove(), (dur+2)*1000);
}
setInterval(createHeart, 800);

// ═══════════════════════════════════════
// Slideshow
// ═══════════════════════════════════════
const slides = document.querySelectorAll('.slide');
const dots = document.querySelectorAll('.dot');
let current = 0;
function goTo(n) {
  slides[current].classList.remove('active');
  dots[current].classList.remove('active');
  current = n;
  slides[current].classList.add('active');
  dots[current].classList.add('active');
}
setInterval(()=>goTo((current+1)%4), 3500);

// ═══════════════════════════════════════
// Confetti
// ═══════════════════════════════════════
const canvas = document.getElementById('confetti-canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener('resize', ()=>{ canvas.width=window.innerWidth; canvas.height=window.innerHeight; });
const colors = ['#FF69B4','#FFD700','#FF1493','#FF6EB4','#FFC0CB','#FF85A2','#FFFFFF','#FFB6C1'];
const pieces = Array.from({length:120}, ()=>{
  return {x:Math.random()*canvas.width,y:Math.random()*canvas.height-canvas.height,r:Math.random()*8+4,d:Math.random()*120+80,color:colors[Math.floor(Math.random()*colors.length)],tilt:Math.random()*10-10,tiltAngle:0,tiltAngleIncrement:(Math.random()*0.07+0.05)*(Math.random()<0.5?1:-1),type:Math.random()<0.5?'circle':'rect'};
});
let angle = 0;
function drawConfetti() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  angle += 0.01;
  pieces.forEach(p=>{
    p.tiltAngle += p.tiltAngleIncrement;
    p.y += (Math.cos(angle+p.d)+1+p.r/2)*0.8;
    p.tilt = Math.sin(p.tiltAngle)*12;
    if (p.y > canvas.height+20) { p.x=Math.random()*canvas.width; p.y=-20; }
    ctx.beginPath();
    ctx.fillStyle = p.color;
    ctx.globalAlpha = 0.85;
    if (p.type==='circle') {
      ctx.arc(p.x+p.tilt,p.y,p.r,0,Math.PI*2);
    } else {
      ctx.save(); ctx.translate(p.x+p.tilt,p.y); ctx.rotate(p.tiltAngle);
      ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*1.5); ctx.restore();
    }
    ctx.fill();
  });
  requestAnimationFrame(drawConfetti);
}
drawConfetti();
</script>
